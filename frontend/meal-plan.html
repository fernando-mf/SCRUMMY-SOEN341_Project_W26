<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMajor - Weekly Meal Planner</title>
  <link rel="stylesheet" href="styles.css?v=13" />
  <style>
    .planner-shell {
      width: 100%;
      display: grid;
      gap: 18px;
    }

    .planner-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(53, 26, 19, 0.08);
      padding: 22px;
    }

    .planner-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(190px, 1fr));
      gap: 20px;
      align-items: end;
    }

    .planner-group {
      display: flex;
      flex-direction: column;
    }

    .planner-group label {
      margin: 0 0 10px;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .planner-group input,
    .planner-group select {
      width: 100%;
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #d7c9c6;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      background: #fff;
      min-height: 52px;
      box-sizing: border-box;
    }

    .planner-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .planner-actions .btn {
      margin-top: 0;
    }

    .week-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff5f2;
      border: 1px solid #e6d7d4;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .week-grid-wrap {
      border: 1px solid #eadcdc;
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .day-card {
      border: 1px solid #f1e4e1;
      border-radius: 12px;
      background: #fffaf8;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .week-nav-card {
      border-style: dashed;
      background: #fff;
      justify-content: space-between;
    }

    .week-nav-title {
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fff5f2;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-main);
    }

    .week-nav-meta {
      margin: 0;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
      padding: 0 4px;
    }

    .week-nav-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .week-nav-btn {
      border: 1px solid #e2cbc6;
      border-radius: 10px;
      background: #fff;
      color: var(--text-main);
      font-size: 12px;
      font-weight: 700;
      padding: 8px;
      cursor: pointer;
    }

    .week-nav-btn:hover {
      background: #fff0eb;
    }

    .day-title {
      margin: 0;
      padding: 8px 10px;
      border-radius: 10px;
      background: #fff5f2;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-main);
      text-align: left;
    }

    .day-slot {
      border: 1px solid #efe0dc;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day-slot-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #8f7670;
    }

    .meal-pill {
      border: 1px solid #e6d7d4;
      border-radius: 10px;
      background: #fff5f2;
      padding: 8px;
      font-size: 12px;
      line-height: 1.35;
      color: var(--text-main);
    }

    .meal-pill strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .meal-pill-actions {
      display: flex;
      gap: 6px;
    }

    .meal-pill-actions button {
      border: 1px solid #e2cbc6;
      border-radius: 8px;
      background: #fff;
      color: var(--text-main);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      cursor: pointer;
    }

    .meal-pill-actions button:hover {
      background: #fff0eb;
    }

    .cell-empty {
      margin: 0;
      text-align: left;
      font-size: 11px;
      color: #a08983;
    }

    .helper-note {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 940px) {
      .planner-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
    }

    @media (max-width: 640px) {
      .planner-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div class="page-title">
        <h1 class="brand">MealMajor</h1>
        <h2 class="title">Weekly Meal Planner</h2>
      </div>
      <nav class="nav-actions">
        <a class="btn btn-secondary" href="recipe.html">Back</a>
      </nav>
    </header>

    <section class="card card-wide planner-shell">
      <div id="planner-message" class="message hidden" role="alert" aria-live="polite"></div>

      <div class="planner-card">
        <div id="week-label" class="week-label"></div>

        <div class="planner-row">
          <div class="planner-group">
            <label for="plan-name">Plan Name</label>
            <input type="text" id="plan-name" placeholder="e.g. Midterm Survival Week" />
          </div>

          <div class="planner-group">
            <label for="week-start">Week Start (Monday)</label>
            <input type="date" id="week-start" />
          </div>

          <div class="planner-group">
            <label for="meal-day">Day</label>
            <select id="meal-day"></select>
          </div>

          <div class="planner-group">
            <label for="meal-type">Meal Type</label>
            <select id="meal-type">
              <option value="breakfast">Breakfast</option>
              <option value="lunch">Lunch</option>
              <option value="dinner">Dinner</option>
              <option value="snack">Snack</option>
            </select>
          </div>
        </div>

        <div class="planner-row" style="margin-top: 12px;">
          <div class="planner-group" style="grid-column: 1 / -1;">
            <label for="recipe-select">Recipe</label>
            <select id="recipe-select">
              <option value="">Select one of your recipes...</option>
            </select>
            <p class="helper-note">Duplicate recipe assignments in the same week are prevented.</p>
          </div>
        </div>

        <div class="planner-actions">
          <button id="save-assignment-btn" class="btn" type="button">Add Meal</button>
          <button id="cancel-edit-btn" class="btn btn-secondary" type="button" style="display: none;">Cancel Edit</button>
          <button id="clear-week-btn" class="btn btn-secondary" type="button">Clear Week</button>
          <a class="btn btn-secondary" href="create-recipe.html">Create New Recipe</a>
        </div>
      </div>

      <div class="planner-card">
        <div class="week-grid-wrap">
          <div id="week-grid" class="week-grid"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const BASE_URL =
      window.__BASE_URL__ ||
      (window.location.hostname === "localhost" ? "http://localhost:3000/api" : "/api");

    const STORAGE_KEY = "mealmajor.weekly-plans.v1";
    const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    const MEAL_TYPES = ["breakfast", "lunch", "dinner", "snack"];

    const messageEl = document.getElementById("planner-message");
    const weekLabelEl = document.getElementById("week-label");
    const weekStartInput = document.getElementById("week-start");
    const planNameInput = document.getElementById("plan-name");
    const mealDaySelect = document.getElementById("meal-day");
    const mealTypeSelect = document.getElementById("meal-type");
    const recipeSelect = document.getElementById("recipe-select");
    const saveAssignmentBtn = document.getElementById("save-assignment-btn");
    const cancelEditBtn = document.getElementById("cancel-edit-btn");
    const clearWeekBtn = document.getElementById("clear-week-btn");
    const weekGridEl = document.getElementById("week-grid");

    const plannerState = {
      recipes: [],
      plansByWeek: {},
      currentWeekKey: "",
      editingId: null,
    };

    function setMessage(text, type = "") {
      if (!text) {
        messageEl.className = "message hidden";
        messageEl.textContent = "";
        return;
      }
      messageEl.className = `message ${type}`.trim();
      messageEl.textContent = text;
    }

    function mondayFromDate(dateValue) {
      const d = new Date(`${dateValue}T00:00:00`);
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function formatDateInput(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(dateObj, count) {
      const d = new Date(dateObj);
      d.setDate(d.getDate() + count);
      return d;
    }

    function getWeekLabel(startDate) {
      const endDate = addDays(startDate, 6);
      const startText = startDate.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      const endText = endDate.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      const year = endDate.getFullYear();
      return `${startText} - ${endText}, ${year}`;
    }

    function normalizeWeekStart() {
      const weekStart = mondayFromDate(weekStartInput.value || formatDateInput(new Date()));
      const iso = formatDateInput(weekStart);
      weekStartInput.value = iso;
      plannerState.currentWeekKey = iso;
      weekLabelEl.textContent = `Week: ${getWeekLabel(weekStart)}`;
      if (!plannerState.plansByWeek[iso]) {
        plannerState.plansByWeek[iso] = { planName: "", meals: [] };
      }
    }

    function loadStoredPlans() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          plannerState.plansByWeek = {};
          return;
        }
        const parsed = JSON.parse(raw);
        plannerState.plansByWeek = parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        plannerState.plansByWeek = {};
      }
    }

    function saveStoredPlans() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(plannerState.plansByWeek));
    }

    function getCurrentPlan() {
      return plannerState.plansByWeek[plannerState.currentWeekKey] || { planName: "", meals: [] };
    }

    function fillDayOptions() {
      mealDaySelect.innerHTML = DAYS.map((day) => `<option value="${day}">${day}</option>`).join("");
    }

    function renderRecipeOptions() {
      const defaultOpt = '<option value="">Select one of your recipes...</option>';
      const opts = plannerState.recipes
        .map((recipe) => `<option value="${recipe.id}">${recipe.name}</option>`)
        .join("");
      recipeSelect.innerHTML = defaultOpt + opts;
    }

    function renderGrid() {
      const plan = getCurrentPlan();
      weekGridEl.innerHTML = "";

      DAYS.forEach((day) => {
        const daySlots = MEAL_TYPES.map((mealType) => {
          const assignment = plan.meals.find((item) => item.day === day && item.mealType === mealType);
          if (!assignment) {
            return `
              <div class="day-slot">
                <div class="day-slot-header">${mealType}</div>
                <p class="cell-empty">No meal assigned</p>
              </div>
            `;
          }

          return `
            <div class="day-slot">
              <div class="day-slot-header">${mealType}</div>
              <div class="meal-pill">
                <strong>${assignment.recipeName}</strong>
                <div class="meal-pill-actions">
                  <button type="button" data-action="edit" data-id="${assignment.id}">Edit</button>
                  <button type="button" data-action="remove" data-id="${assignment.id}">Remove</button>
                </div>
              </div>
            </div>
          `;
        }).join("");

        weekGridEl.insertAdjacentHTML(
          "beforeend",
          `<article class="day-card">
            <h4 class="day-title">${day}</h4>
            ${daySlots}
          </article>`,
        );
      });

      const weekStart = new Date(`${plannerState.currentWeekKey}T00:00:00`);
      const prevWeek = addDays(weekStart, -7);
      const nextWeek = addDays(weekStart, 7);
      weekGridEl.insertAdjacentHTML(
        "beforeend",
        `<article class="day-card week-nav-card">
          <h4 class="week-nav-title">Week Navigation</h4>
          <p class="week-nav-meta">${getWeekLabel(weekStart)}</p>
          <div class="week-nav-actions">
            <button type="button" class="week-nav-btn" data-week-nav="prev">← Previous Week</button>
            <button type="button" class="week-nav-btn" data-week-nav="next">Next Week →</button>
          </div>
          <p class="week-nav-meta">Prev: ${getWeekLabel(prevWeek)}<br />Next: ${getWeekLabel(nextWeek)}</p>
        </article>`,
      );
    }

    function shiftWeek(days) {
      const current = new Date(`${plannerState.currentWeekKey}T00:00:00`);
      const shifted = addDays(current, days);
      weekStartInput.value = formatDateInput(shifted);
      normalizeWeekStart();
      syncPlanMetaToInputs();
      renderGrid();
      exitEditMode();
    }

    function enterEditMode(assignmentId) {
      const plan = getCurrentPlan();
      const assignment = plan.meals.find((item) => item.id === assignmentId);
      if (!assignment) return;

      plannerState.editingId = assignment.id;
      mealDaySelect.value = assignment.day;
      mealTypeSelect.value = assignment.mealType;
      recipeSelect.value = String(assignment.recipeId);

      saveAssignmentBtn.textContent = "Update Meal";
      cancelEditBtn.style.display = "inline-flex";
      setMessage("Editing meal assignment.", "ok");
    }

    function exitEditMode() {
      plannerState.editingId = null;
      saveAssignmentBtn.textContent = "Add Meal";
      cancelEditBtn.style.display = "none";
      mealDaySelect.selectedIndex = 0;
      mealTypeSelect.selectedIndex = 0;
      recipeSelect.selectedIndex = 0;
    }

    function removeAssignment(assignmentId) {
      const plan = getCurrentPlan();
      plan.meals = plan.meals.filter((item) => item.id !== assignmentId);
      plannerState.plansByWeek[plannerState.currentWeekKey] = plan;
      saveStoredPlans();
      renderGrid();
      exitEditMode();
      setMessage("Meal removed from planner.", "ok");
    }

    function syncPlanMetaToInputs() {
      const plan = getCurrentPlan();
      planNameInput.value = plan.planName || "";
    }

    function saveAssignment() {
      const day = mealDaySelect.value;
      const mealType = mealTypeSelect.value;
      const recipeId = Number(recipeSelect.value);
      const selectedRecipe = plannerState.recipes.find((recipe) => Number(recipe.id) === recipeId);

      if (!selectedRecipe) {
        setMessage("Please select a recipe.", "error");
        return;
      }

      const plan = getCurrentPlan();
      plan.planName = planNameInput.value.trim();

      const sameSlot = plan.meals.find(
        (item) => item.day === day && item.mealType === mealType && item.id !== plannerState.editingId,
      );
      if (sameSlot) {
        setMessage("This day and meal type already has a recipe. Edit it instead.", "error");
        return;
      }

      const duplicateRecipe = plan.meals.find(
        (item) => item.recipeId === recipeId && item.id !== plannerState.editingId,
      );
      if (duplicateRecipe) {
        setMessage("That recipe is already assigned in this week.", "error");
        return;
      }

      if (plannerState.editingId) {
        plan.meals = plan.meals.map((item) =>
          item.id === plannerState.editingId
            ? {
                ...item,
                day,
                mealType,
                recipeId,
                recipeName: selectedRecipe.name,
              }
            : item,
        );
      } else {
        plan.meals.push({
          id: `m-${Date.now()}-${Math.round(Math.random() * 1000)}`,
          day,
          mealType,
          recipeId,
          recipeName: selectedRecipe.name,
        });
      }

      plannerState.plansByWeek[plannerState.currentWeekKey] = plan;
      saveStoredPlans();
      renderGrid();
      exitEditMode();
      setMessage("Meal assignment saved.", "ok");
    }

    async function loadRecipes() {
      const token = localStorage.getItem("token");
      if (!token) {
        window.location.href = "login.html";
        return;
      }

      let userId = null;
      try {
        const payload = JSON.parse(atob(token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/")));
        userId = payload?.sub ? Number(payload.sub) : null;
      } catch {
        userId = null;
      }

      const requestUrl = new URL(`${BASE_URL}/recipes`);
      if (userId) {
        requestUrl.searchParams.set("authors", String(userId));
      }

      try {
        const response = await fetch(requestUrl.toString(), {
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
        });

        if (!response.ok) {
          setMessage("Could not load recipes for assignment.", "error");
          return;
        }

        const payload = await response.json();
        plannerState.recipes = Array.isArray(payload?.data) ? payload.data : [];
        renderRecipeOptions();

        if (!plannerState.recipes.length) {
          setMessage("Create a recipe first, then assign it to the planner.", "");
        }
      } catch {
        setMessage("Could not load recipes for assignment.", "error");
      }
    }

    function clearWeek() {
      const plan = getCurrentPlan();
      plan.meals = [];
      plannerState.plansByWeek[plannerState.currentWeekKey] = plan;
      saveStoredPlans();
      renderGrid();
      exitEditMode();
      setMessage("Current week cleared.", "ok");
    }

    weekGridEl.addEventListener("click", (event) => {
      const weekNavButton = event.target.closest("button[data-week-nav]");
      if (weekNavButton) {
        const direction = weekNavButton.getAttribute("data-week-nav");
        if (direction === "prev") {
          shiftWeek(-7);
          return;
        }
        if (direction === "next") {
          shiftWeek(7);
          return;
        }
      }

      const button = event.target.closest("button[data-action]");
      if (!button) return;

      const id = button.getAttribute("data-id");
      const action = button.getAttribute("data-action");
      if (!id || !action) return;

      if (action === "edit") {
        enterEditMode(id);
      }

      if (action === "remove") {
        removeAssignment(id);
      }
    });

    saveAssignmentBtn.addEventListener("click", saveAssignment);
    cancelEditBtn.addEventListener("click", () => {
      exitEditMode();
      setMessage("", "");
    });
    clearWeekBtn.addEventListener("click", clearWeek);

    weekStartInput.addEventListener("change", () => {
      normalizeWeekStart();
      syncPlanMetaToInputs();
      renderGrid();
      exitEditMode();
    });

    planNameInput.addEventListener("input", () => {
      const plan = getCurrentPlan();
      plan.planName = planNameInput.value.trim();
      plannerState.plansByWeek[plannerState.currentWeekKey] = plan;
      saveStoredPlans();
    });

    function init() {
      fillDayOptions();
      loadStoredPlans();

      const today = new Date();
      weekStartInput.value = formatDateInput(today);
      normalizeWeekStart();
      syncPlanMetaToInputs();
      renderGrid();
      loadRecipes();
    }

    init();
  </script>
</body>
</html>
